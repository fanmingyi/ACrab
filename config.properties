# ============================================================================
# visual_locator.py 配置文件
# ============================================================================

# 保存标注 bbox 的调试图到 tmp/debug_visual_locator.png
debug=true

# 自检时是否执行 VLM 推理测试（false 可跳过，加快启动）
selfcheck_vlm=true

# ============================================================================
# 后端选择（二选一）
# ----------------------------------------------------------------------------
#   api    - 云端 API（DashScope 等，需 API Key）
#   ollama - Ollama 原生 API（支持 think 参数控制思考模式）
# ============================================================================
backend=ollama

# ============================================================================
# [api] 云端 API
# ============================================================================
api_model=qwen-vl-max
api_base_url=https://dashscope.aliyuncs.com/compatible-mode/v1
# API Key 从此环境变量读取（不要直接写 Key）
api_key_env=DASHSCOPE_API_KEY

# ============================================================================
# [ollama] Ollama 原生 API
# ============================================================================
ollama_model=qwen3.5:9b
ollama_base_url=http://127.0.0.1:11434
# 是否启用模型思考模式（true=开启深度推理，false=关闭以加速）
ollama_thinking=false
