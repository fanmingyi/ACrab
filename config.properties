# visual_locator.py configuration

# Save annotated debug image to tmp/debug_visual_locator.png when enabled
debug=true

# Backend type: local (local mlx-vlm inference), api (OpenAI-compatible API), vllm (LAN vLLM server), remote (host HTTP service)
backend=local

# === Model configuration (independent for each backend) ===

# Model for local mode (HuggingFace ID or local path)
local_model=mlx-community/Qwen2.5-VL-7B-Instruct-4bit

# Model for api mode (API model name)
api_model=qwen-vl-max

# === API mode only ===

# Environment variable name for API Key (do not put the key directly here)
api_key_env=DASHSCOPE_API_KEY

# API Base URL (OpenAI-compatible endpoint)
api_base_url=https://dashscope.aliyuncs.com/compatible-mode/v1

# === vLLM mode only (LAN vLLM server, e.g. Qwen3-VL) ===

# vLLM server base URL (OpenAI-compatible endpoint)
vllm_base_url=http://YOUR_VLLM_SERVER_IP:8000/v1

# Model name served by vLLM
vllm_model=Qwen/Qwen3-VL-8B-Instruct

# === Remote mode only (for Docker container, calls host Mac's MLX model) ===

# Host visual_locator_server.py URL (Mac runs: python visual_locator_server.py)
remote_url=http://host.docker.internal:8420

# === Self-check configuration ===

# Run VLM model test (load model + inference) during self-check. Set false to skip for faster startup
selfcheck_vlm=true